<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug-info { background: #f5f5f5; padding: 15px; margin: 10px 0; border-left: 4px solid #007bff; }
        .error { border-left-color: #dc3545; background: #fef5f5; }
        .success { border-left-color: #28a745; background: #f5fef5; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .tool-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; background: white; }
    </style>
</head>
<body>
    <h1>Debug Test - Tools Loading</h1>
    
    <div id="debug-output"></div>
    <div id="tools-container"></div>
    
    <script>
        const debugOutput = document.getElementById('debug-output');
        const toolsContainer = document.getElementById('tools-container');
        
        function addDebugInfo(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `debug-info ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            debugOutput.appendChild(div);
            console.log(message);
        }
        
        addDebugInfo('Starting debug test...');
        
        // Test 1: Load sample tools directly
        async function testLoadTools() {
            try {
                addDebugInfo('Testing direct fetch of sample-tools.json...');
                const response = await fetch('./data/sample-tools.json');
                addDebugInfo(`Response status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const tools = await response.json();
                addDebugInfo(`Loaded ${tools.length} tools successfully`, 'success');
                
                // Display tools
                toolsContainer.innerHTML = '<h2>Loaded Tools:</h2>';
                const grid = document.createElement('div');
                grid.className = 'tools-grid';
                
                tools.forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'tool-card';
                    card.innerHTML = `
                        <h3><i class="${tool.icon}"></i> ${tool.name}</h3>
                        <p><strong>Category:</strong> ${tool.category}</p>
                        <p>${tool.description}</p>
                        <p><strong>Link:</strong> <a href="${tool.link}" target="_blank">${tool.link}</a></p>
                        <p><strong>Rating:</strong> ${tool.rating || 'N/A'}</p>
                    `;
                    grid.appendChild(card);
                });
                
                toolsContainer.appendChild(grid);
                
            } catch (error) {
                addDebugInfo(`Error loading tools: ${error.message}`, 'error');
            }
        }
        
        // Test 2: Check if we're in the right directory
        async function testDirectoryStructure() {
            addDebugInfo('Testing directory structure...');
            
            const testFiles = [
                './data/sample-tools.json',
                './data/categories.json',
                './js/tools.js',
                './js/storage.js'
            ];
            
            for (const file of testFiles) {
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    addDebugInfo(`✓ ${file} - Status: ${response.status}`, response.ok ? 'success' : 'error');
                } catch (error) {
                    addDebugInfo(`✗ ${file} - Error: ${error.message}`, 'error');
                }
            }
        }
        
        // Run tests
        async function runTests() {
            await testDirectoryStructure();
            await testLoadTools();
        }
        
        runTests();
    </script>
</body>
</html>
