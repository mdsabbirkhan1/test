<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .status { padding: 15px; margin: 15px 0; border-radius: 6px; border-left: 4px solid #6366f1; background: #f8fafc; }
        .error { border-left-color: #ef4444; background: #fef2f2; color: #dc2626; }
        .success { border-left-color: #10b981; background: #f0fdf4; color: #047857; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .category-card { 
            background: white; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 20px; 
            text-align: center; 
            transition: transform 0.2s;
        }
        .category-card:hover { transform: translateY(-2px); }
        .category-icon { 
            width: 60px; 
            height: 60px; 
            border-radius: 8px; 
            margin: 0 auto 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 24px; 
            color: white;
        }
        .test-button {
            background: #6366f1; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            margin: 5px;
        }
        .test-button:hover { background: #5855eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏷️ Categories Test</h1>
        <p>This page tests the categories loading and display functionality.</p>
        
        <div>
            <button class="test-button" onclick="testCategoriesLoad()">Test Categories Load</button>
            <button class="test-button" onclick="testCategoriesDisplay()">Test Categories Display</button>
            <button class="test-button" onclick="clearOutput()">Clear Output</button>
        </div>
        
        <div id="status-output"></div>
        <div id="categories-output"></div>
    </div>

    <script>
        const statusOutput = document.getElementById('status-output');
        const categoriesOutput = document.getElementById('categories-output');
        
        function addStatus(message, type = 'status') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            statusOutput.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function clearOutput() {
            statusOutput.innerHTML = '';
            categoriesOutput.innerHTML = '';
        }
        
        async function testCategoriesLoad() {
            addStatus('Testing categories data loading...');
            
            try {
                const response = await fetch('./data/categories.json');
                addStatus(`Response: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const categories = await response.json();
                addStatus(`Successfully loaded ${categories.length} categories`, 'success');
                
                // Display basic info about each category
                categories.forEach(cat => {
                    addStatus(`Category: ${cat.name} (${cat.id}) - ${cat.description}`);
                });
                
                return categories;
                
            } catch (error) {
                addStatus(`Error loading categories: ${error.message}`, 'error');
                return null;
            }
        }
        
        async function testCategoriesDisplay() {
            addStatus('Testing categories display...');
            
            const categories = await testCategoriesLoad();
            if (!categories) {
                addStatus('Cannot display categories - loading failed', 'error');
                return;
            }
            
            // Create display
            categoriesOutput.innerHTML = '<h2>Categories Display Test:</h2>';
            const grid = document.createElement('div');
            grid.className = 'categories-grid';
            
            categories.forEach((category, index) => {
                const card = document.createElement('div');
                card.className = 'category-card';
                
                card.innerHTML = `
                    <div class="category-icon" style="background: ${category.color}">
                        <i class="${category.icon}"></i>
                    </div>
                    <h3>${category.name}</h3>
                    <div style="color: #6b7280; font-size: 14px; margin-bottom: 10px;">
                        ID: ${category.id}
                    </div>
                    <div style="color: #6b7280;">
                        ${category.description}
                    </div>
                `;
                
                grid.appendChild(card);
                addStatus(`Created card for: ${category.name}`);
            });
            
            categoriesOutput.appendChild(grid);
            addStatus(`Successfully displayed ${categories.length} category cards`, 'success');
        }
        
        // Test default categories
        function getDefaultCategories() {
            return [
                {
                    id: 'development',
                    name: 'Development',
                    icon: 'fas fa-code',
                    description: 'Tools for developers and programmers',
                    color: '#6366f1'
                },
                {
                    id: 'design',
                    name: 'Design',
                    icon: 'fas fa-palette',
                    description: 'Design and creative tools',
                    color: '#ec4899'
                },
                {
                    id: 'productivity',
                    name: 'Productivity',
                    icon: 'fas fa-tasks',
                    description: 'Tools to boost your productivity',
                    color: '#10b981'
                }
            ];
        }
        
        // Auto-run test on load
        window.addEventListener('load', () => {
            addStatus('Page loaded, running automatic test...');
            setTimeout(() => {
                testCategoriesDisplay();
            }, 1000);
        });
    </script>
</body>
</html>
