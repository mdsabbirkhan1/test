<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Play free online games instantly! Huge collection of HTML5 games including action, puzzle, racing, and more. Play offline with PWA support.">
    <meta name="keywords" content="online games, free games, HTML5 games, browser games, play games online, offline games, PWA games">
    <meta name="author" content="Online Gaming Hub">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Online Gaming Hub - Play Free Games Online">
    <meta property="og:description" content="Play thousands of free online games instantly. Action, puzzle, racing, and more!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Online Gaming Hub - Play Free Games Online">
    <meta name="twitter:description" content="Play thousands of free online games instantly.">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gaming Hub">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    
    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <title>Online Gaming Hub - Play Free Games Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PWA Install Popup -->
    <div id="pwa-install-popup" class="pwa-popup hidden">
        <div class="pwa-popup-content">
            <button class="pwa-close-btn" id="pwa-close">&times;</button>
            <div class="pwa-icon">🎮</div>
            <h3>Install Gaming Hub</h3>
            <p>Install our app for quick access and offline gaming!</p>
            <div class="pwa-buttons">
                <button class="pwa-install-btn" id="pwa-install">Install Now</button>
                <button class="pwa-later-btn" id="pwa-later">Maybe Later</button>
            </div>
        </div>
    </div>

    <!-- Game Fullscreen Modal -->
    <div id="game-modal" class="game-modal hidden">
        <div class="game-modal-header">
            <div class="game-modal-info">
                <button id="game-back-btn" class="game-back-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h2 id="game-modal-title">Game Title</h2>
            </div>
            <button id="game-fullscreen-btn" class="game-fullscreen-btn" title="Toggle Fullscreen">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                </svg>
            </button>
        </div>
        <div class="game-modal-body">
            <iframe id="game-iframe" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-container">
                    <h1 class="logo">🎮 GAMING HUB</h1>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                        <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg class="moon-icon hidden" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Search Bar -->
    <section class="search-section">
        <div class="container">
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search games...">
                <button id="clear-search" class="clear-search hidden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    </section>

    <!-- Categories Section -->
    <section class="categories-section">
        <div class="container">
            <div class="categories-header">
                <h2>Categories</h2>
                <div class="category-scroll-controls">
                    <button class="category-scroll-btn prev" id="category-prev">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <button class="category-scroll-btn next" id="category-next">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="categories-wrapper">
                <div class="categories-container" id="categories-container">
                    <button class="category-btn active" data-category="all">All Games</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Games Section -->
    <main class="main-content">
        <div class="container">
            <!-- Recently Played Section -->
            <section id="recent-section" class="games-section hidden">
                <h2 class="section-title">Recently Played</h2>
                <div id="recent-games" class="games-grid"></div>
            </section>

            <!-- All Games Section -->
            <section class="games-section">
                <h2 class="section-title" id="games-title">All Games</h2>
                <div id="loading-spinner" class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading games...</p>
                </div>
                <div id="games-grid" class="games-grid"></div>
                <div id="no-results" class="no-results hidden">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <h3>No Games Found</h3>
                    <p>Try adjusting your search or filter.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 Gaming Hub. All rights reserved.</p>
            <p>Play thousands of free online games!</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="pwa-install.js"></script>
</body>
</html>
